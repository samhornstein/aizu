name: Release

# Intentional, milestone-based releases: generates a changelog from Conventional
# Commits (git-cliff) and cuts a GitHub Release. Trigger it either by pushing a
# tag (`git tag v0.2.0 && git push origin v0.2.0`) or from the Actions tab
# ("Run workflow" — leave version blank to auto-compute the next version).
#
# No container images are published: the default install builds from source
# (see docker-compose.yml), so there's nothing to pull.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. v1.2.3 (blank = auto-compute from commits)"
        required: false

permissions:
  contents: write # create tags + releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Determine version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            next="${{ github.ref_name }}"                       # the tag that was pushed
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            next="${{ github.event.inputs.version }}"           # explicit dispatch input
          else
            latest=$(git tag --sort=-v:refname | head -n1)
            if [ -z "$latest" ]; then
              next="v0.1.0"                                     # bootstrap first release
            else
              next=$(git cliff --bumped-version 2>/dev/null || echo "$latest")
            fi
          fi
          next="v${next#v}"                                     # normalize to a single v prefix
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Releasing $next"

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${{ steps.ver.outputs.next }}" >/dev/null; then
            echo "Tag ${{ steps.ver.outputs.next }} already exists; releasing it as-is."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${{ steps.ver.outputs.next }}" -m "${{ steps.ver.outputs.next }}"
            git push origin "${{ steps.ver.outputs.next }}"
          fi

      - name: Generate changelog
        run: git cliff --latest --strip header -o CHANGES.md

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.next }}" \
            --title "${{ steps.ver.outputs.next }}" \
            --notes-file CHANGES.md
