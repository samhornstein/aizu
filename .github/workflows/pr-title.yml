name: PR Title

# Conventional Commits are enforced on the PR *title* rather than individual
# commits: PRs are squash-merged, so the title becomes the commit on main and is
# what drives automated versioning (see release.yml). This works for every
# contributor without them installing the local commit-msg hook.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

jobs:
  lint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Keep in sync with .githooks/commit-msg.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
