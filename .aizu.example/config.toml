# Aizu configuration
# Copy this file to .aizu/config.toml and edit as needed.
# All settings can also be overridden via environment variables.

[queue]
redis_url = "redis://localhost:6379"

[trigger]
keyword = "@aizu"
repos = []   # required: e.g. ["owner/repo1", "owner/repo2"]
users = []   # optional: restrict to these GitHub logins; empty = allow all

[agent]
image = "ghcr.io/samhornstein/aizu-agent:pi"
command = "pi -p \"$(cat {prompt_file})\""
timeout = 1200

[poller]
interval_seconds = 15
