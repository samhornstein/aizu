services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - aizu-net

  aizu:
    # Aizu is built from the source you cloned, so you always run exactly what's
    # in your working tree. Re-run with `docker compose up -d --build` after
    # pulling changes.
    build: .
    image: aizu:local
    restart: unless-stopped
    # The worker launches agent sandboxes via the host Docker daemon.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./aizu.toml:/etc/aizu/aizu.toml:ro
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - AIZU_CONFIG=/etc/aizu/aizu.toml
    depends_on:
      - redis
    networks:
      - aizu-net

volumes:
  redis-data:

networks:
  aizu-net:
    driver: bridge
