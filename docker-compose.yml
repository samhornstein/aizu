services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - aizu-net

  aizu:
    # Aizu is built from the source you cloned, so you always run exactly what's
    # in your working tree. Re-run with `docker compose up -d --build` after
    # pulling changes.
    build: .
    image: aizu:local
    restart: unless-stopped
    # The worker launches agent sandboxes via the host Docker daemon.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # All configuration comes from .env (see .env.example).
    env_file:
      - .env
    environment:
      # Reach the bundled Redis by its compose service name. Inside this container
      # "localhost" is the container itself (not the redis service), so the code's
      # localhost default won't work here. Override via REDIS_URL in .env for a
      # hosted/external Redis.
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # Source builds use the locally built agent image (make build-agent),
      # not the published ghcr.io default. Tracks AIZU_ENGINE so presets
      # work in dev too.
      - CONTAINER_IMAGE=${CONTAINER_IMAGE:-aizu-agent:${AIZU_ENGINE:-pi}}
    # host.docker.internal is built in on Docker Desktop but not on Linux;
    # this makes it resolve everywhere so local model servers on the host
    # (Ollama, llama.cpp, LM Studio) are reachable.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
    networks:
      - aizu-net

  # Agent sandbox images, one per engine (AIZU_ENGINE). NOT long-running
  # services — the aizu worker launches containers from them on demand via
  # the host Docker daemon. They live here, behind the "agent" profile so
  # `docker compose up` never starts them, purely so Compose builds them from
  # source alongside the app:
  #   make build-agent              # builds agent-pi (or ENGINE=claude …)
  # To add an engine, create templates/<engine>/Dockerfile, mirror a service
  # below, and add a preset (or set CONTAINER_IMAGE + ENGINE_COMMAND).
  agent-pi:
    build: ./templates/pi
    image: aizu-agent:pi
    profiles: ["agent"]

  agent-claude:
    build: ./templates/claude
    image: aizu-agent:claude
    profiles: ["agent"]

volumes:
  redis-data:

networks:
  aizu-net:
    driver: bridge
