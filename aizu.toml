[queue]
redis_url = "redis://localhost:6379"

[trigger]
keyword = "aizu"
repos = []   # required: e.g. ["owner/repo1", "owner/repo2"]
users = []   # optional: restrict to these GitHub logins; empty = allow all

[agent]
image = "ghcr.io/samhornstein/aizu-agent:pi"
command = "pi -p \"$(cat {prompt_file})\""
timeout = 600

[poller]
interval_seconds = 15

# GitHub App authentication (alternative to GITHUB_TOKEN).
# All three must be set; the private key (app_key) is read from GITHUB_APP_KEY env var.
# [github_app]
# app_id = 12345678
# install_id = 87654321
