name: CI

on:
  push:
    branches: [main]
  pull_request:

# Superseded runs on the same branch are cancelled — agents push in bursts.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: go.mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || {
            echo "::error::go.mod/go.sum are not tidy — run: go mod tidy"; exit 1; }

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Pinned so unrelated PRs can't break on a new linter release.
          # Keep in sync with the local install (.githooks/pre-commit).
          version: v2.12.2

      - name: Test
        run: go test -race ./...

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: E2E test
        run: go test -tags e2e -race -timeout 60s ./e2e/...
        env:
          REDIS_URL: redis://localhost:6379/1

  # Every Dockerfile must stay buildable; nothing else exercises them until
  # release time.
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Build aizu image
        run: docker build -t aizu:ci .

      - name: Build agent images
        run: |
          for engine in templates/*/; do
            engine=$(basename "$engine")
            docker build -t "aizu-agent:ci-$engine" "templates/$engine"
          done
