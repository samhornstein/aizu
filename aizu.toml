[queue]
redis_url = "redis://localhost:6379"

[trigger]
keyword = "aizu"
repos = []   # required: e.g. ["owner/repo1", "owner/repo2"]
users = []   # optional: restrict to these GitHub logins; empty = allow all

[agent]
image = "ghcr.io/samhornstein/aizu-agent:pi"
command = "pi -p \"$(cat {prompt_file})\""
timeout = 1200

[poller]
interval_seconds = 15

# Webhook mode: when enabled, Aizu listens on :8080 for GitHub webhook events
# instead of (or in addition to) polling. Requires configuring a webhook in your
# repo settings pointing to http://<your-server>:8080/.
# Set `secret` to the webhook secret for HMAC signature verification.
[webhook]
enabled = false
# secret = "your-webhook-secret"
