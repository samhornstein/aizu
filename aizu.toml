[queue]
redis_url = "redis://localhost:6379"

[trigger]
keyword = "aizu"
repos = []   # required: e.g. ["owner/repo1", "owner/repo2"]
users = []   # optional: restrict to these GitHub logins; empty = allow all

[agent]
image = "ghcr.io/samhornstein/aizu-agent:pi"
command = "pi -p \"$(cat {prompt_file})\""
timeout = 1200

[poller]
interval_seconds = 15

# Rate limiting (optional)
# max_concurrent: max parallel agent runs (default 1)
# requests_per_minute: max tasks enqueued per window (0 = unlimited)
# rate_window_seconds: window duration for requests_per_minute (default 60)
[ratelimit]
# max_concurrent = 1
# requests_per_minute = 0
# rate_window_seconds = 60
