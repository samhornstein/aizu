name: Publish Agent Image

on:
  push:
    branches: [main]
    paths:
      - templates/pi/Dockerfile

permissions:
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: templates/pi
          file: templates/pi/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/aizu-agent:pi
