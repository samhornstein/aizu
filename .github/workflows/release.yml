name: Release

# Cut a release from the Actions tab: Release -> Run workflow. Leave "version"
# blank to auto-compute the next version from your Conventional Commits
# (git-cliff): feat -> minor, fix -> patch, ! / BREAKING -> major. It tags the
# commit, generates a changelog, and publishes a GitHub Release.
#
# Each release also publishes multi-arch images to ghcr.io — the default
# no-clone install (deploy/docker-compose.yml) pulls :latest. Building from
# source (the root docker-compose.yml) remains the contributor path.
#
# Check "dry run" to preview the computed version and changelog (in the run
# summary) without tagging, releasing, or pushing anything.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. v1.2.3 (blank = auto-compute from commits)"
        required: false
      dry_run:
        description: "Dry run: print the version and changelog, publish nothing"
        type: boolean
        default: false

permissions:
  contents: write # push the tag + create the release
  packages: write # publish images to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags for the changelog and version bump

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Insurance: never tag a commit whose tests don't pass, even if it
      # somehow reached main.
      - name: Test
        run: go test ./...

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Determine version
        id: ver
        run: |
          set -euo pipefail
          latest=$(git tag --sort=-v:refname | head -n1)
          if [ -n "${{ github.event.inputs.version }}" ]; then
            next="${{ github.event.inputs.version }}"          # explicit override
          elif [ -z "$latest" ]; then
            next="v0.1.0"                                      # bootstrap first release
          else
            next=$(git cliff --bumped-version 2>/dev/null || echo "$latest")
          fi
          next="v${next#v}"                                   # normalize to a single v prefix
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "Releasing $next"

      # The tag doesn't exist yet on a dry run, so preview the changelog from
      # the unreleased commits instead of --latest.
      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          git cliff --unreleased --tag "${{ steps.ver.outputs.next }}" --strip header -o CHANGES.md
          {
            echo "## Dry run: would release ${{ steps.ver.outputs.next }}"
            echo
            cat CHANGES.md
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Tag the release
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${{ steps.ver.outputs.next }}" >/dev/null; then
            echo "Tag ${{ steps.ver.outputs.next }} already exists; releasing it as-is."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${{ steps.ver.outputs.next }}" -m "${{ steps.ver.outputs.next }}"
            git push origin "${{ steps.ver.outputs.next }}"
          fi

      - name: Generate changelog
        if: ${{ !inputs.dry_run }}
        run: git cliff --latest --strip header -o CHANGES.md

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.next }}" \
            --title "${{ steps.ver.outputs.next }}" \
            --notes-file CHANGES.md

      # Publish images from this same checkout — the tag above points at
      # HEAD, so source and tag always match.
      - uses: docker/setup-qemu-action@v3
        if: ${{ !inputs.dry_run }}
      - uses: docker/setup-buildx-action@v3
        if: ${{ !inputs.dry_run }}
      - uses: docker/login-action@v4
        if: ${{ !inputs.dry_run }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish aizu image
        if: ${{ !inputs.dry_run }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/samhornstein/aizu:latest
            ghcr.io/samhornstein/aizu:${{ steps.ver.outputs.next }}

      - name: Publish agent image (pi)
        if: ${{ !inputs.dry_run }}
        uses: docker/build-push-action@v6
        with:
          context: ./templates/pi
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/samhornstein/aizu-agent-pi:latest
            ghcr.io/samhornstein/aizu-agent-pi:${{ steps.ver.outputs.next }}

      - name: Publish agent image (claude)
        if: ${{ !inputs.dry_run }}
        uses: docker/build-push-action@v6
        with:
          context: ./templates/claude
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/samhornstein/aizu-agent-claude:latest
            ghcr.io/samhornstein/aizu-agent-claude:${{ steps.ver.outputs.next }}

      - name: Publish agent image (aider)
        if: ${{ !inputs.dry_run }}
        uses: docker/build-push-action@v6
        with:
          context: ./templates/aider
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/samhornstein/aizu-agent-aider:latest
            ghcr.io/samhornstein/aizu-agent-aider:${{ steps.ver.outputs.next }}

      - name: Publish agent image (opencode)
        if: ${{ !inputs.dry_run }}
        uses: docker/build-push-action@v6
        with:
          context: ./templates/opencode
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/samhornstein/aizu-agent-opencode:latest
            ghcr.io/samhornstein/aizu-agent-opencode:${{ steps.ver.outputs.next }}
